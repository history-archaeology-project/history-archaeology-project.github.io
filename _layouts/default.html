<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

    <header class="site-header">
        <div class="container">
            <div class="site-branding">
                <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
                <p class="site-description">{{ site.description }}</p>
            </div>
            <nav class="site-navigation">
                <ul>
                    {% for link in site.navigation %}
                    <li><a href="{{ link.url | relative_url }}">{{ link.title }}</a></li>
                    {% endfor %}
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-content">
        <div class="container">
            <article class="page-article">
                {{ content }}
<div class="giscus-comments" style="margin-top: 50px; border-top: 1px solid #d5dbdb; padding-top: 30px;">
  <script src="https://giscus.app/client.js"
          data-repo="history-archaeology-project/history-archaeology-project.github.io"
          data-repo-id="R_kgDONo_abc" 
          data-category="Announcements"
          data-category-id="DIC_kwDONo_abc"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="top"
          data-theme="light"
          data-lang="en"
          crossorigin="anonymous"
          async>
  </script>
</div>
            </article>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Built with passion for history.</p>
        </div>
    </footer>

</body>
</html>
